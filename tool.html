<!DOCTYPE html>
<html lang="ko" class="light scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta id="metaDesc" name="description" content="">
  <title id="pageTitle">AI모아</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="data.js"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] } } }
    }
  </script>
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .similar-card { transition: transform 0.2s, box-shadow 0.2s; }
    .similar-card:hover { transform: translateY(-2px); }
  </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-white min-h-screen">

  <!-- ── Navbar ── -->
  <nav class="sticky top-0 z-50 bg-white/85 dark:bg-slate-900/85 backdrop-blur-xl border-b border-slate-200 dark:border-slate-800">
    <div class="max-w-5xl mx-auto px-5 h-14 flex items-center justify-between">
      <a href="index.html" class="flex items-center gap-2 font-black text-xl text-slate-900 dark:text-white no-underline">
        <span class="text-2xl">🤖</span>
        <span>AI<span class="text-indigo-500">모아</span></span>
      </a>
      <div class="flex items-center gap-3">
        <a href="index.html" class="text-[11px] font-black text-slate-400 hover:text-indigo-500 transition-colors uppercase tracking-widest hidden sm:block">← 전체 목록</a>
        <button id="darkToggle" onclick="toggleDark()" class="w-9 h-9 rounded-full bg-slate-100 dark:bg-slate-800 flex items-center justify-center transition-colors hover:bg-slate-200 dark:hover:bg-slate-700">
          <span id="darkIcon">🌙</span>
        </button>
      </div>
    </div>
  </nav>

  <!-- ── 404 fallback ── -->
  <div id="notFound" class="hidden max-w-5xl mx-auto px-5 py-32 text-center">
    <div class="text-6xl mb-6">🤖</div>
    <h1 class="text-3xl font-black text-slate-800 dark:text-white mb-3">툴을 찾을 수 없어요</h1>
    <p class="text-slate-500 font-bold mb-8">요청하신 AI 툴 정보가 존재하지 않아요.</p>
    <a href="index.html" class="inline-flex items-center gap-2 px-6 py-3 bg-indigo-500 text-white rounded-2xl font-black text-sm hover:bg-indigo-600 transition-colors">
      전체 목록으로 →
    </a>
  </div>

  <!-- ── Content ── -->
  <div id="content" class="hidden">

    <!-- Hero -->
    <div id="hero" class="border-b border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900">
      <div class="max-w-5xl mx-auto px-5 py-10">
        <!-- Breadcrumb -->
        <nav class="flex items-center gap-2 text-[11px] font-black text-slate-400 uppercase tracking-widest mb-6">
          <a href="index.html" class="hover:text-indigo-500 transition-colors">AI모아</a>
          <span>›</span>
          <a id="breadCat" href="#" onclick="goCat()" class="hover:text-indigo-500 transition-colors cursor-pointer"></a>
          <span>›</span>
          <span id="breadName" class="text-slate-600 dark:text-slate-300"></span>
        </nav>

        <div class="flex flex-col sm:flex-row sm:items-start gap-6">
          <!-- Icon -->
          <div id="heroIcon" class="w-20 h-20 rounded-3xl flex items-center justify-center text-5xl flex-shrink-0"></div>

          <!-- Info -->
          <div class="flex-1 min-w-0">
            <div class="flex flex-wrap items-center gap-2 mb-2">
              <h1 id="heroName" class="text-3xl md:text-4xl font-black text-slate-900 dark:text-white"></h1>
              <span id="heroBadgeHot" class="hidden text-[11px] font-black bg-rose-500 text-white px-2.5 py-1 rounded-full">HOT 🔥</span>
            </div>
            <p id="heroTagline" class="text-slate-500 dark:text-slate-400 font-bold text-lg mb-4"></p>
            <div class="flex flex-wrap items-center gap-2">
              <span id="heroCat" class="text-[11px] font-black px-3 py-1.5 rounded-full border"></span>
              <span id="heroFree" class="text-[11px] font-black px-3 py-1.5 rounded-full"></span>
            </div>
          </div>

          <!-- CTA -->
          <div class="flex-shrink-0">
            <a id="heroUrl" href="#" target="_blank" rel="noopener noreferrer"
               class="flex items-center gap-2 px-6 py-3 bg-slate-900 dark:bg-white text-white dark:text-slate-900 rounded-2xl font-black text-sm hover:opacity-80 transition-opacity whitespace-nowrap">
              공식 사이트 바로가기 <i class="fa-solid fa-arrow-up-right-from-square text-xs"></i>
            </a>
          </div>
        </div>
      </div>
    </div>

    <!-- Body -->
    <div class="max-w-5xl mx-auto px-5 py-10">
      <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">

        <!-- Left (2/3) -->
        <div class="lg:col-span-2 space-y-8">

          <!-- 요금제 -->
          <section>
            <h2 class="text-lg font-black text-slate-800 dark:text-white mb-4 flex items-center gap-2">
              <span class="text-xl">💳</span> 요금제
            </h2>
            <div id="plansGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-3"></div>
          </section>

          <!-- 장단점 -->
          <section class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div class="bg-emerald-50 dark:bg-emerald-500/10 rounded-2xl p-5">
              <h2 class="text-sm font-black text-emerald-700 dark:text-emerald-400 mb-3 flex items-center gap-2">
                <i class="fa-solid fa-circle-check"></i> 장점
              </h2>
              <ul id="prosList" class="space-y-2"></ul>
            </div>
            <div class="bg-rose-50 dark:bg-rose-500/10 rounded-2xl p-5">
              <h2 class="text-sm font-black text-rose-700 dark:text-rose-400 mb-3 flex items-center gap-2">
                <i class="fa-solid fa-circle-xmark"></i> 단점
              </h2>
              <ul id="consList" class="space-y-2"></ul>
            </div>
          </section>

          <!-- 활용 사례 -->
          <section>
            <h2 class="text-lg font-black text-slate-800 dark:text-white mb-4 flex items-center gap-2">
              <span class="text-xl">💡</span> 이런 용도로 쓰세요
            </h2>
            <ul id="useCasesList" class="grid grid-cols-1 sm:grid-cols-2 gap-2"></ul>
          </section>

          <!-- 꿀팁 -->
          <section class="bg-indigo-50 dark:bg-indigo-500/10 rounded-2xl p-6">
            <h2 class="text-lg font-black text-indigo-700 dark:text-indigo-300 mb-4 flex items-center gap-2">
              <span class="text-xl">🍯</span> 꿀팁
            </h2>
            <ul id="tipsList" class="space-y-3"></ul>
          </section>

        </div>

        <!-- Right (1/3) -->
        <div class="space-y-6">

          <!-- 이런 분께 추천 -->
          <section class="bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 p-5">
            <h2 class="text-sm font-black text-slate-700 dark:text-slate-300 mb-3 flex items-center gap-2">
              <span>👤</span> 이런 분께 추천
            </h2>
            <ul id="recommendList" class="space-y-2"></ul>
          </section>

          <!-- 공식 사이트 -->
          <section class="bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 p-5">
            <h2 class="text-sm font-black text-slate-700 dark:text-slate-300 mb-3">🔗 공식 링크</h2>
            <a id="sideUrl" href="#" target="_blank" rel="noopener noreferrer"
               class="flex items-center justify-between gap-2 w-full py-2.5 px-4 rounded-xl bg-slate-900 dark:bg-white text-white dark:text-slate-900 text-xs font-black hover:opacity-80 transition-opacity">
              <span id="sideUrlText"></span>
              <i class="fa-solid fa-arrow-up-right-from-square text-[10px]"></i>
            </a>
          </section>

          <!-- 비슷한 툴 -->
          <section class="bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 p-5">
            <h2 class="text-sm font-black text-slate-700 dark:text-slate-300 mb-3">🔀 비슷한 툴</h2>
            <div id="similarList" class="space-y-2"></div>
          </section>

        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="border-t border-slate-200 dark:border-slate-800 mt-10 py-8 px-5">
    <div class="max-w-5xl mx-auto flex flex-col sm:flex-row items-center justify-between gap-3">
      <a href="index.html" class="flex items-center gap-2 font-black text-base text-slate-900 dark:text-white no-underline">
        <span>🤖</span><span>AI<span class="text-indigo-500">모아</span></span>
      </a>
      <p class="text-xs text-slate-400 font-bold">© 2026 AI모아 · 한국어 AI 툴 디렉토리</p>
    </div>
  </footer>

  <script>
  const FREE_CLASS_MAP = {
    "무료":    "bg-emerald-100 dark:bg-emerald-500/15 text-emerald-700 dark:text-emerald-400",
    "부분무료":"bg-amber-100 dark:bg-amber-500/15 text-amber-700 dark:text-amber-400",
    "유료":    "bg-rose-100 dark:bg-rose-500/15 text-rose-700 dark:text-rose-400",
  };
  const CAT_BORDER = {
    "챗봇":  "border-indigo-200 dark:border-indigo-800 text-indigo-600 dark:text-indigo-300 bg-indigo-50 dark:bg-indigo-500/10",
    "이미지":"border-rose-200 dark:border-rose-800 text-rose-600 dark:text-rose-300 bg-rose-50 dark:bg-rose-500/10",
    "영상":  "border-violet-200 dark:border-violet-800 text-violet-600 dark:text-violet-300 bg-violet-50 dark:bg-violet-500/10",
    "코딩":  "border-emerald-200 dark:border-emerald-800 text-emerald-600 dark:text-emerald-300 bg-emerald-50 dark:bg-emerald-500/10",
    "생산성":"border-amber-200 dark:border-amber-800 text-amber-600 dark:text-amber-300 bg-amber-50 dark:bg-amber-500/10",
    "음성":  "border-sky-200 dark:border-sky-800 text-sky-600 dark:text-sky-300 bg-sky-50 dark:bg-sky-500/10",
    "번역":  "border-teal-200 dark:border-teal-800 text-teal-600 dark:text-teal-300 bg-teal-50 dark:bg-teal-500/10",
  };

  function goCat() {
    const tool = getToolFromURL();
    if (tool) window.location.href = `index.html?cat=${encodeURIComponent(tool.cat)}`;
  }

  function getToolFromURL() {
    const id = new URLSearchParams(window.location.search).get("id");
    return TOOLS.find(t => t.id === id) || null;
  }

  function render(tool) {
    // Meta
    document.getElementById("pageTitle").textContent = `${tool.name} 한국어 가이드 — AI모아`;
    document.getElementById("metaDesc").setAttribute("content",
      `${tool.name} 한국어 사용법 가이드. ${tool.tagline}. 요금제·장단점·활용 사례·꿀팁 정리.`);

    // Breadcrumb
    document.getElementById("breadCat").textContent = tool.cat;
    document.getElementById("breadName").textContent = tool.name;

    // Hero
    const iconBg = CAT_ICON_BG[tool.cat] || "bg-slate-100";
    document.getElementById("heroIcon").className = `w-20 h-20 rounded-3xl flex items-center justify-center text-5xl flex-shrink-0 ${iconBg}`;
    document.getElementById("heroIcon").textContent = tool.emoji;
    document.getElementById("heroName").textContent = tool.name;
    document.getElementById("heroTagline").textContent = tool.tagline;
    if (tool.hot) document.getElementById("heroBadgeHot").classList.remove("hidden");
    document.getElementById("heroCat").textContent = tool.cat;
    document.getElementById("heroCat").className += " " + (CAT_BORDER[tool.cat] || "");
    document.getElementById("heroFree").textContent = tool.free;
    document.getElementById("heroFree").className += " " + (FREE_CLASS_MAP[tool.free] || "");
    document.getElementById("heroUrl").href = tool.url;
    document.getElementById("sideUrl").href = tool.url;
    document.getElementById("sideUrlText").textContent = tool.url.replace("https://", "");

    // Plans
    document.getElementById("plansGrid").innerHTML = (tool.plans || []).map(p => `
      <div class="bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 p-4">
        <div class="flex items-center justify-between mb-3">
          <span class="font-black text-slate-800 dark:text-white text-sm">${p.name}</span>
          <span class="font-black text-indigo-500 text-sm">${p.price}</span>
        </div>
        <ul class="space-y-1.5">
          ${p.features.map(f => `<li class="text-xs text-slate-500 dark:text-slate-400 font-bold flex items-start gap-1.5"><span class="text-emerald-500 mt-0.5 flex-shrink-0">✓</span>${f}</li>`).join("")}
        </ul>
      </div>
    `).join("");

    // Pros
    document.getElementById("prosList").innerHTML = (tool.pros || []).map(p =>
      `<li class="text-xs font-bold text-emerald-800 dark:text-emerald-300 flex items-start gap-1.5"><span class="flex-shrink-0 mt-0.5">•</span>${p}</li>`
    ).join("");

    // Cons
    document.getElementById("consList").innerHTML = (tool.cons || []).map(c =>
      `<li class="text-xs font-bold text-rose-800 dark:text-rose-300 flex items-start gap-1.5"><span class="flex-shrink-0 mt-0.5">•</span>${c}</li>`
    ).join("");

    // Use cases
    document.getElementById("useCasesList").innerHTML = (tool.useCases || []).map(u =>
      `<li class="flex items-start gap-2 bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800 px-4 py-3 text-sm font-bold text-slate-700 dark:text-slate-300">
        <span class="text-indigo-400 mt-0.5 flex-shrink-0">→</span>${u}
      </li>`
    ).join("");

    // Tips
    document.getElementById("tipsList").innerHTML = (tool.tips || []).map((tip, i) =>
      `<li class="flex items-start gap-3">
        <span class="font-black text-indigo-500 text-sm flex-shrink-0 mt-0.5">${i + 1}</span>
        <span class="text-sm font-bold text-indigo-900 dark:text-indigo-200">${tip}</span>
      </li>`
    ).join("");

    // Recommend
    document.getElementById("recommendList").innerHTML = (tool.recommend || []).map(r =>
      `<li class="flex items-start gap-2 text-xs font-bold text-slate-600 dark:text-slate-400">
        <span class="text-indigo-400 flex-shrink-0">✓</span>${r}
      </li>`
    ).join("");

    // Similar tools
    const similars = (tool.similar || []).map(id => TOOLS.find(t => t.id === id)).filter(Boolean);
    document.getElementById("similarList").innerHTML = similars.map(s => `
      <a href="tool.html?id=${s.id}" class="similar-card flex items-center gap-3 p-3 rounded-xl border border-slate-200 dark:border-slate-800 hover:border-indigo-300 dark:hover:border-indigo-700 bg-white dark:bg-slate-950 no-underline">
        <div class="w-9 h-9 rounded-xl ${CAT_ICON_BG[s.cat] || ''} flex items-center justify-center text-xl flex-shrink-0">${s.emoji}</div>
        <div class="min-w-0">
          <p class="font-black text-slate-800 dark:text-white text-sm leading-tight">${s.name}</p>
          <p class="text-[10px] font-bold text-slate-400 truncate">${s.desc.slice(0, 28)}…</p>
        </div>
      </a>
    `).join("");
  }

  // ── Dark Mode ──────────────────────────────────────────────────────────────
  function toggleDark() {
    const isDark = document.documentElement.classList.toggle("dark");
    document.getElementById("darkIcon").textContent = isDark ? "☀️" : "🌙";
    localStorage.setItem("aim-theme", isDark ? "dark" : "light");
  }

  // ── Init ───────────────────────────────────────────────────────────────────
  document.addEventListener("DOMContentLoaded", () => {
    if (localStorage.getItem("aim-theme") === "dark") {
      document.documentElement.classList.add("dark");
      document.getElementById("darkIcon").textContent = "☀️";
    }
    const tool = getToolFromURL();
    if (!tool) {
      document.getElementById("notFound").classList.remove("hidden");
      return;
    }
    document.getElementById("content").classList.remove("hidden");
    render(tool);
  });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta id="metaDesc" name="description" content="">
  <title id="pageTitle">AI모아</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="data.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --accent: #a3e635;
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #1e1e1e;
      --dim: #444;
      --mid: #777;
    }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #fff; min-height: 100vh; }
    .mono { font-family: 'Space Mono', monospace; }
    a { text-decoration: none; color: inherit; }
    button { font-family: inherit; cursor: pointer; background: none; border: none; }

    /* NAV */
    .nav { position: sticky; top: 0; z-index: 50; background: var(--bg); border-bottom: 1px solid var(--border); }
    .nav-inner { max-width: 960px; margin: 0 auto; padding: 0 20px; height: 56px; display: flex; align-items: center; justify-content: space-between; }
    .logo { font-weight: 900; font-size: 1.05rem; letter-spacing: -0.02em; color: var(--accent); }

    /* NOT FOUND */
    .not-found { display: none; max-width: 960px; margin: 0 auto; padding: 120px 20px; text-align: center; }
    .not-found.show { display: block; }
    .not-found-title { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; margin: 16px 0 8px; }
    .not-found-desc { color: var(--mid); font-size: 0.875rem; margin-bottom: 32px; }
    .btn-primary { display: inline-flex; align-items: center; gap: 8px; padding: 12px 24px; background: var(--accent); color: #000; font-weight: 800; font-size: 0.875rem; transition: opacity 0.15s; }
    .btn-primary:hover { opacity: 0.85; }

    /* HERO */
    .tool-hero { border-bottom: 1px solid var(--border); padding: 40px 20px; }
    .tool-hero-inner { max-width: 960px; margin: 0 auto; }
    .breadcrumb { display: flex; align-items: center; gap: 6px; margin-bottom: 28px; }
    .breadcrumb a, .breadcrumb span { font-family: 'Space Mono', monospace; font-size: 0.6rem; color: var(--dim); letter-spacing: 0.04em; }
    .breadcrumb a:hover { color: var(--accent); }
    .breadcrumb-sep { color: #2a2a2a; }
    .breadcrumb-current { color: var(--mid) !important; }

    .hero-layout { display: flex; align-items: flex-start; gap: 24px; flex-wrap: wrap; }
    .hero-emoji { font-size: 3.5rem; line-height: 1; flex-shrink: 0; width: 72px; height: 72px; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border); background: var(--surface); }
    .hero-info { flex: 1; min-width: 0; }
    .hero-name-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 8px; }
    .hero-name { font-size: clamp(1.8rem, 5vw, 2.8rem); font-weight: 900; letter-spacing: -0.04em; line-height: 1; }
    .hero-hot { font-family: 'Space Mono', monospace; font-size: 0.6rem; padding: 3px 8px; background: var(--accent); color: #000; font-weight: 700; letter-spacing: 0.04em; }
    .hero-tagline { color: var(--mid); font-size: 0.9rem; font-weight: 500; margin-bottom: 16px; }
    .hero-tags { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .hero-cat { font-family: 'Space Mono', monospace; font-size: 0.6rem; padding: 4px 10px; border: 1px solid var(--border); color: var(--mid); letter-spacing: 0.04em; }
    .hero-free { font-family: 'Space Mono', monospace; font-size: 0.6rem; padding: 4px 10px; border: 1px solid; letter-spacing: 0.04em; }
    .free-free    { border-color: #16a34a; color: #4ade80; }
    .free-partial { border-color: #92400e; color: #fbbf24; }
    .free-paid    { border-color: #991b1b; color: #f87171; }
    .hero-cta { flex-shrink: 0; }
    .cta-btn { display: inline-flex; align-items: center; gap: 8px; padding: 12px 22px; background: var(--accent); color: #000; font-weight: 800; font-size: 0.8rem; white-space: nowrap; transition: opacity 0.15s; }
    .cta-btn:hover { opacity: 0.85; }

    /* BODY */
    .body-wrap { max-width: 960px; margin: 0 auto; padding: 40px 20px; }
    .body-grid { display: grid; grid-template-columns: 1fr 300px; gap: 28px; }
    @media (max-width: 720px) { .body-grid { grid-template-columns: 1fr; } }

    /* SECTION HEADING */
    .sec-title { font-weight: 900; font-size: 0.95rem; letter-spacing: -0.01em; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
    .sec-icon { font-size: 1rem; }
    .sec { margin-bottom: 36px; }

    /* PLANS */
    .plans-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 8px; }
    .plan-card { border: 1px solid var(--border); background: var(--surface); padding: 16px; }
    .plan-name { font-weight: 800; font-size: 0.85rem; margin-bottom: 4px; }
    .plan-price { font-family: 'Space Mono', monospace; font-size: 0.7rem; color: var(--accent); margin-bottom: 14px; }
    .plan-features { list-style: none; display: flex; flex-direction: column; gap: 6px; }
    .plan-feature { font-size: 0.72rem; color: #666; font-weight: 500; display: flex; align-items: flex-start; gap: 6px; line-height: 1.45; }
    .plan-check { color: #4ade80; flex-shrink: 0; margin-top: 1px; }

    /* PROS / CONS */
    .pros-cons { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    @media (max-width: 500px) { .pros-cons { grid-template-columns: 1fr; } }
    .pros-box { border: 1px solid #14532d; background: #0a1a0f; padding: 16px; }
    .cons-box { border: 1px solid #7f1d1d; background: #1a0a0a; padding: 16px; }
    .pros-title { font-family: 'Space Mono', monospace; font-size: 0.62rem; color: #4ade80; letter-spacing: 0.04em; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
    .cons-title { font-family: 'Space Mono', monospace; font-size: 0.62rem; color: #f87171; letter-spacing: 0.04em; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
    .pros-list, .cons-list { list-style: none; display: flex; flex-direction: column; gap: 7px; }
    .pros-list li { font-size: 0.75rem; color: #86efac; font-weight: 500; display: flex; align-items: flex-start; gap: 6px; line-height: 1.5; }
    .cons-list li { font-size: 0.75rem; color: #fca5a5; font-weight: 500; display: flex; align-items: flex-start; gap: 6px; line-height: 1.5; }
    .li-dot { flex-shrink: 0; margin-top: 6px; width: 4px; height: 4px; border-radius: 50%; }
    .pros-dot { background: #4ade80; }
    .cons-dot { background: #f87171; }

    /* USE CASES */
    .usecases-list { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    @media (max-width: 500px) { .usecases-list { grid-template-columns: 1fr; } }
    .usecase-item { border: 1px solid var(--border); background: var(--surface); padding: 12px 14px; font-size: 0.78rem; font-weight: 600; color: #ccc; display: flex; align-items: flex-start; gap: 8px; line-height: 1.45; }
    .usecase-arrow { color: var(--accent); flex-shrink: 0; font-size: 0.7rem; margin-top: 2px; }

    /* TIPS */
    .tips-box { border: 1px solid #1e2a10; background: #0e1a07; padding: 20px; }
    .tips-title { font-family: 'Space Mono', monospace; font-size: 0.62rem; color: var(--accent); letter-spacing: 0.06em; margin-bottom: 16px; }
    .tips-list { list-style: none; display: flex; flex-direction: column; gap: 12px; }
    .tip-item { display: flex; align-items: flex-start; gap: 12px; }
    .tip-num { font-family: 'Space Mono', monospace; font-weight: 700; font-size: 0.65rem; color: var(--accent); flex-shrink: 0; margin-top: 2px; }
    .tip-text { font-size: 0.8rem; font-weight: 600; color: #ccc; line-height: 1.55; }

    /* SIDEBAR */
    .sidebar-card { border: 1px solid var(--border); background: var(--surface); padding: 16px; margin-bottom: 10px; }
    .sidebar-title { font-family: 'Space Mono', monospace; font-size: 0.6rem; color: var(--dim); letter-spacing: 0.05em; margin-bottom: 14px; }
    .recommend-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
    .recommend-item { font-size: 0.75rem; font-weight: 600; color: #999; display: flex; align-items: flex-start; gap: 6px; line-height: 1.45; }
    .rec-check { color: var(--accent); flex-shrink: 0; font-size: 0.65rem; margin-top: 2px; }

    .link-btn { display: flex; align-items: center; justify-content: space-between; gap: 8px; width: 100%; padding: 10px 14px; background: #fff; color: #000; font-weight: 800; font-size: 0.75rem; transition: opacity 0.15s; }
    .link-btn:hover { opacity: 0.85; }

    .similar-list { display: flex; flex-direction: column; gap: 6px; }
    .similar-item { border: 1px solid var(--border); background: var(--bg); padding: 10px 12px; display: flex; align-items: center; gap: 10px; transition: border-color 0.15s; }
    .similar-item:hover { border-color: var(--accent); }
    .similar-emoji { font-size: 1.2rem; flex-shrink: 0; }
    .similar-name { font-weight: 700; font-size: 0.8rem; color: #fff; }
    .similar-desc { font-size: 0.68rem; color: var(--dim); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 160px; }

    /* FOOTER */
    .footer { border-top: 1px solid var(--border); margin-top: 60px; padding: 32px 20px; }
    .footer-inner { max-width: 960px; margin: 0 auto; display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 12px; }
    .footer-logo { font-weight: 900; color: var(--accent); font-size: 0.95rem; }
    .footer-copy { font-family: 'Space Mono', monospace; font-size: 0.58rem; color: #222; }
  </style>
</head>
<body>

  <nav class="nav">
    <div class="nav-inner">
      <a href="index.html"><span class="logo">AI모아</span></a>
      <a href="index.html" class="mono" style="font-size:0.6rem; color:var(--dim); letter-spacing:0.04em; display:flex; align-items:center; gap:6px; transition:color 0.15s;" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--dim)'">← 전체 목록</a>
    </div>
  </nav>

  <div id="notFound" class="not-found">
    <span style="font-size:3rem;">⚡</span>
    <h1 class="not-found-title">툴을 찾을 수 없어요</h1>
    <p class="not-found-desc">요청하신 AI 툴 정보가 존재하지 않아요.</p>
    <a href="index.html" class="btn-primary">전체 목록으로 →</a>
  </div>

  <div id="content" style="display:none;">

    <div class="tool-hero">
      <div class="tool-hero-inner">
        <nav class="breadcrumb">
          <a href="index.html">AI모아</a>
          <span class="breadcrumb-sep">›</span>
          <a id="breadCat" href="#" onclick="goCat()"></a>
          <span class="breadcrumb-sep">›</span>
          <span id="breadName" class="breadcrumb-current"></span>
        </nav>
        <div class="hero-layout">
          <div id="heroIcon" class="hero-emoji"></div>
          <div class="hero-info">
            <div class="hero-name-row">
              <h1 id="heroName" class="hero-name"></h1>
              <span id="heroBadgeHot" class="hero-hot" style="display:none;">HOT</span>
            </div>
            <p id="heroTagline" class="hero-tagline"></p>
            <div class="hero-tags">
              <span id="heroCat" class="hero-cat"></span>
              <span id="heroFree" class="hero-free"></span>
            </div>
          </div>
          <div class="hero-cta">
            <a id="heroUrl" href="#" target="_blank" rel="noopener noreferrer" class="cta-btn">
              공식 사이트 <i class="fa-solid fa-arrow-up-right-from-square" style="font-size:0.7rem;"></i>
            </a>
          </div>
        </div>
      </div>
    </div>

    <div class="body-wrap">
      <div class="body-grid">

        <div>
          <div class="sec">
            <h2 class="sec-title"><span class="sec-icon">💳</span> 요금제</h2>
            <div id="plansGrid" class="plans-grid"></div>
          </div>

          <div class="sec">
            <div class="pros-cons">
              <div class="pros-box">
                <p class="pros-title"><i class="fa-solid fa-circle-check"></i> 장점</p>
                <ul id="prosList" class="pros-list"></ul>
              </div>
              <div class="cons-box">
                <p class="cons-title"><i class="fa-solid fa-circle-xmark"></i> 단점</p>
                <ul id="consList" class="cons-list"></ul>
              </div>
            </div>
          </div>

          <div class="sec">
            <h2 class="sec-title"><span class="sec-icon">💡</span> 이런 용도로 쓰세요</h2>
            <div id="useCasesList" class="usecases-list"></div>
          </div>

          <div class="sec">
            <div class="tips-box">
              <p class="tips-title">/ 꿀팁</p>
              <ul id="tipsList" class="tips-list"></ul>
            </div>
          </div>
        </div>

        <div>
          <div class="sidebar-card">
            <p class="sidebar-title">/ 이런 분께 추천</p>
            <ul id="recommendList" class="recommend-list"></ul>
          </div>

          <div class="sidebar-card">
            <p class="sidebar-title">/ 공식 링크</p>
            <a id="sideUrl" href="#" target="_blank" rel="noopener noreferrer" class="link-btn">
              <span id="sideUrlText"></span>
              <i class="fa-solid fa-arrow-up-right-from-square" style="font-size:0.65rem;"></i>
            </a>
          </div>

          <div class="sidebar-card">
            <p class="sidebar-title">/ 비슷한 툴</p>
            <div id="similarList" class="similar-list"></div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <footer class="footer">
    <div class="footer-inner">
      <a href="index.html"><span class="footer-logo">AI모아</span></a>
      <span class="footer-copy">© 2026 · 한국어 AI 툴 디렉토리</span>
    </div>
  </footer>

  <script>
  function freeClass(free) {
    if (free === "무료") return "free-free";
    if (free === "유료") return "free-paid";
    return "free-partial";
  }

  function goCat() {
    const tool = getToolFromURL();
    if (tool) window.location.href = `index.html?cat=${encodeURIComponent(tool.cat)}`;
  }

  function getToolFromURL() {
    const id = new URLSearchParams(window.location.search).get("id");
    return TOOLS.find(t => t.id === id) || null;
  }

  function render(tool) {
    document.getElementById("pageTitle").textContent = `${tool.name} 한국어 가이드 — AI모아`;
    document.getElementById("metaDesc").setAttribute("content",
      `${tool.name} 한국어 사용법. ${tool.tagline}. 요금제·장단점·활용 사례·꿀팁.`);

    document.getElementById("breadCat").textContent = tool.cat;
    document.getElementById("breadName").textContent = tool.name;

    document.getElementById("heroIcon").textContent = tool.emoji;
    document.getElementById("heroName").textContent = tool.name;
    document.getElementById("heroTagline").textContent = tool.tagline;
    if (tool.hot) document.getElementById("heroBadgeHot").style.display = "inline";
    document.getElementById("heroCat").textContent = tool.cat;
    const freeEl = document.getElementById("heroFree");
    freeEl.textContent = tool.free;
    freeEl.classList.add(freeClass(tool.free));
    document.getElementById("heroUrl").href = tool.url;
    document.getElementById("sideUrl").href = tool.url;
    document.getElementById("sideUrlText").textContent = tool.url.replace("https://", "");

    document.getElementById("plansGrid").innerHTML = (tool.plans || []).map(p => `
      <div class="plan-card">
        <p class="plan-name">${p.name}</p>
        <p class="plan-price">${p.price}</p>
        <ul class="plan-features">
          ${p.features.map(f => `<li class="plan-feature"><span class="plan-check">✓</span>${f}</li>`).join("")}
        </ul>
      </div>
    `).join("");

    document.getElementById("prosList").innerHTML = (tool.pros || []).map(p =>
      `<li><span class="li-dot pros-dot"></span>${p}</li>`
    ).join("");

    document.getElementById("consList").innerHTML = (tool.cons || []).map(c =>
      `<li><span class="li-dot cons-dot"></span>${c}</li>`
    ).join("");

    document.getElementById("useCasesList").innerHTML = (tool.useCases || []).map(u =>
      `<div class="usecase-item"><span class="usecase-arrow">→</span>${u}</div>`
    ).join("");

    document.getElementById("tipsList").innerHTML = (tool.tips || []).map((tip, i) =>
      `<li class="tip-item"><span class="tip-num">0${i + 1}</span><span class="tip-text">${tip}</span></li>`
    ).join("");

    document.getElementById("recommendList").innerHTML = (tool.recommend || []).map(r =>
      `<li class="recommend-item"><span class="rec-check">✓</span>${r}</li>`
    ).join("");

    const similars = (tool.similar || []).map(id => TOOLS.find(t => t.id === id)).filter(Boolean);
    document.getElementById("similarList").innerHTML = similars.map(s => `
      <a href="tool.html?id=${s.id}" class="similar-item">
        <span class="similar-emoji">${s.emoji}</span>
        <div style="min-width:0;">
          <p class="similar-name">${s.name}</p>
          <p class="similar-desc">${s.desc.slice(0, 30)}…</p>
        </div>
      </a>
    `).join("");
  }

  document.addEventListener("DOMContentLoaded", () => {
    const tool = getToolFromURL();
    if (!tool) { document.getElementById("notFound").classList.add("show"); return; }
    document.getElementById("content").style.display = "block";
    render(tool);
  });
  </script>
</body>
</html>

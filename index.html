<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="한국어 AI 툴 디렉토리. 챗봇·이미지·영상·코딩·생산성·음성·번역 분야 AI 툴을 한눈에 비교하고 찾아보세요.">
  <title>AI모아 — 한국어 AI 툴 디렉토리</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,700;0,800;0,900;1,900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="data.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --accent: #a3e635;
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #1e1e1e;
      --dim: #444;
      --mid: #777;
    }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #fff; min-height: 100vh; }
    .mono { font-family: 'Space Mono', monospace; }
    a { text-decoration: none; color: inherit; }
    button { font-family: inherit; cursor: pointer; background: none; border: none; }

    /* NAVBAR */
    .nav { position: sticky; top: 0; z-index: 50; background: var(--bg); border-bottom: 1px solid var(--border); }
    .nav-inner { max-width: 1280px; margin: 0 auto; padding: 0 20px; height: 56px; display: flex; align-items: center; justify-content: space-between; }
    .logo { font-weight: 900; font-size: 1.05rem; letter-spacing: -0.02em; color: var(--accent); }
    .logo-sub { font-family: 'Space Mono', monospace; font-size: 0.6rem; color: var(--dim); margin-left: 8px; }

    /* HERO */
    .hero { padding: 72px 20px 60px; border-bottom: 1px solid var(--border); }
    .hero-inner { max-width: 1280px; margin: 0 auto; }
    .hero-badge { display: inline-flex; align-items: center; gap: 8px; margin-bottom: 24px; }
    .hero-dot { width: 7px; height: 7px; background: var(--accent); border-radius: 50%; flex-shrink: 0; }
    .hero-badge-text { font-family: 'Space Mono', monospace; font-size: 0.62rem; color: var(--dim); letter-spacing: 0.06em; }
    .hero-h1 { font-size: clamp(3rem, 9vw, 6.5rem); font-weight: 900; letter-spacing: -0.045em; line-height: 0.93; margin-bottom: 28px; }
    .hero-h1 em { font-style: italic; color: var(--accent); }
    .hero-desc { color: var(--mid); font-size: 0.875rem; line-height: 1.75; max-width: 400px; margin-bottom: 36px; font-weight: 500; }
    .search-wrap { position: relative; max-width: 520px; }
    .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--dim); font-size: 0.75rem; pointer-events: none; }
    .search-input {
      width: 100%; padding: 14px 16px 14px 40px;
      background: var(--surface); border: 1px solid var(--border); color: #fff;
      font-family: 'Plus Jakarta Sans', sans-serif; font-size: 0.875rem; font-weight: 500;
      outline: none; transition: border-color 0.15s;
    }
    .search-input::placeholder { color: #2e2e2e; }
    .search-input:focus { border-color: var(--accent); }

    /* CAT FILTER */
    .cat-bar { position: sticky; top: 56px; z-index: 40; background: var(--bg); border-bottom: 1px solid var(--border); overflow: hidden; }
    .cat-bar-inner { max-width: 1280px; margin: 0 auto; padding: 10px 20px; overflow-x: auto; }
    .cat-bar-inner::-webkit-scrollbar { display: none; }
    .cat-bar-inner { -ms-overflow-style: none; scrollbar-width: none; }
    .cat-row { display: flex; gap: 6px; flex-wrap: nowrap; }
    .cat-btn {
      font-family: 'Space Mono', monospace; font-size: 0.62rem; letter-spacing: 0.04em;
      padding: 6px 14px; border: 1px solid var(--border); color: var(--mid);
      white-space: nowrap; transition: border-color 0.15s, color 0.15s;
      background: transparent;
    }
    .cat-btn:hover { border-color: var(--accent); color: var(--accent); }
    .cat-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }

    /* GRID */
    .main { max-width: 1280px; margin: 0 auto; padding: 40px 20px; }
    .tools-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 10px; }
    .tool-card {
      border: 1px solid var(--border); background: var(--surface);
      padding: 18px; display: flex; flex-direction: column; gap: 12px;
      transition: border-color 0.15s, background 0.15s;
    }
    .tool-card:hover { border-color: var(--accent); background: #141414; }
    .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
    .card-info { display: flex; align-items: center; gap: 10px; }
    .card-emoji { font-size: 1.4rem; line-height: 1; flex-shrink: 0; }
    .card-name { font-weight: 700; font-size: 0.875rem; color: #fff; }
    .card-name-row { display: flex; align-items: center; gap: 6px; }
    .hot-badge { font-family: 'Space Mono', monospace; font-size: 0.5rem; padding: 2px 6px; background: var(--accent); color: #000; font-weight: 700; letter-spacing: 0.04em; }
    .card-cat { font-family: 'Space Mono', monospace; font-size: 0.58rem; color: var(--dim); letter-spacing: 0.04em; margin-top: 2px; }
    .free-tag { font-family: 'Space Mono', monospace; font-size: 0.55rem; padding: 3px 8px; border: 1px solid; white-space: nowrap; flex-shrink: 0; }
    .free-free    { border-color: #16a34a; color: #4ade80; }
    .free-partial { border-color: #92400e; color: #fbbf24; }
    .free-paid    { border-color: #991b1b; color: #f87171; }
    .card-desc { font-size: 0.75rem; color: #666; line-height: 1.65; flex: 1; font-weight: 500; }
    .card-foot { padding-top: 10px; border-top: 1px solid #1a1a1a; display: flex; align-items: center; justify-content: space-between; }
    .card-more { font-family: 'Space Mono', monospace; font-size: 0.58rem; color: var(--dim); letter-spacing: 0.04em; }
    .card-arrow { color: #2a2a2a; font-size: 0.75rem; }

    /* NO RESULTS */
    .no-results { display: none; text-align: center; padding: 96px 20px; }
    .no-results.show { display: block; }

    /* SITUATIONS */
    .sit-section { margin-top: 80px; padding-top: 60px; border-top: 1px solid var(--border); }
    .sit-header { display: flex; align-items: baseline; gap: 16px; margin-bottom: 28px; }
    .sit-title { font-size: 1.6rem; font-weight: 900; letter-spacing: -0.03em; }
    .sit-label { font-family: 'Space Mono', monospace; font-size: 0.62rem; color: var(--dim); letter-spacing: 0.06em; }
    .sit-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); gap: 8px; }
    .sit-card { border: 1px solid var(--border); background: var(--surface); padding: 16px; text-align: left; transition: border-color 0.15s; cursor: pointer; }
    .sit-card:hover { border-color: var(--accent); }
    .sit-emoji { font-size: 1.5rem; display: block; margin-bottom: 10px; }
    .sit-text { font-weight: 700; font-size: 0.8rem; color: #fff; line-height: 1.3; margin-bottom: 6px; }
    .sit-cat { font-family: 'Space Mono', monospace; font-size: 0.58rem; color: var(--dim); letter-spacing: 0.04em; }

    /* FOOTER */
    .footer { border-top: 1px solid var(--border); margin-top: 80px; padding: 40px 20px; }
    .footer-inner { max-width: 1280px; margin: 0 auto; display: flex; flex-wrap: wrap; align-items: flex-start; justify-content: space-between; gap: 20px; }
    .footer-logo { font-weight: 900; color: var(--accent); font-size: 1rem; }
    .footer-copy { font-family: 'Space Mono', monospace; font-size: 0.58rem; color: #222; margin-top: 5px; }
    .footer-links { display: flex; gap: 24px; }
    .footer-link { font-family: 'Space Mono', monospace; font-size: 0.65rem; color: var(--dim); transition: color 0.15s; }
    .footer-link:hover { color: #fff; }

    @keyframes fadeInUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeInUp 0.28s ease forwards; }
  </style>
</head>
<body>

  <nav class="nav">
    <div class="nav-inner">
      <a href="index.html">
        <span class="logo">AI모아</span>
        <span class="logo-sub">/ DIRECTORY</span>
      </a>
      <span class="mono hidden sm:inline" style="font-size:0.6rem; color:var(--dim); letter-spacing:0.05em;">AI TOOLS · 2026</span>
    </div>
  </nav>

  <section class="hero">
    <div class="hero-inner">
      <div class="hero-badge">
        <span class="hero-dot"></span>
        <span class="hero-badge-text">LIVE · <span id="totalCountHero">—</span>개 툴 등록됨 · 매주 업데이트</span>
      </div>
      <h1 class="hero-h1">지금 필요한<br>AI 툴,<br><em>한번에.</em></h1>
      <p class="hero-desc">챗봇 · 이미지 · 영상 · 코딩 · 생산성 · 음성 · 번역<br>분야별 AI 툴을 한눈에 비교하고 찾아보세요.</p>
      <div class="search-wrap">
        <i class="fa-solid fa-magnifying-glass search-icon"></i>
        <input type="text" id="searchInput" class="search-input"
          placeholder="툴 이름 또는 기능 검색..." oninput="filterTools()">
      </div>
    </div>
  </section>

  <div class="cat-bar">
    <div class="cat-bar-inner">
      <div id="categoryFilter" class="cat-row"></div>
    </div>
  </div>

  <main class="main">
    <div id="noResults" class="no-results">
      <p class="mono" style="color:#2a2a2a; font-size:0.75rem; letter-spacing:0.06em;">NO RESULTS</p>
      <p style="color:var(--dim); font-size:0.875rem; margin-top:10px;">다른 키워드로 검색해보세요</p>
    </div>
    <div id="toolsGrid" class="tools-grid"></div>

    <section class="sit-section">
      <div class="sit-header">
        <h2 class="sit-title">이런 상황이라면?</h2>
        <span class="sit-label">QUICK FINDER</span>
      </div>
      <div id="situationGrid" class="sit-grid"></div>
    </section>
  </main>

  <footer class="footer">
    <div class="footer-inner">
      <div>
        <p class="footer-logo">AI모아</p>
        <p class="footer-copy">© 2026 · 한국어 AI 툴 디렉토리</p>
      </div>
      <div class="footer-links">
        <a href="#" class="footer-link">툴 제보하기</a>
        <a href="#" class="footer-link">광고 문의</a>
      </div>
    </div>
  </footer>

  <script>
  const SITUATIONS = [
    { emoji:"🎙️", text:"회의 자동 요약", cat:"음성" },
    { emoji:"📊", text:"PPT 만들기", cat:"생산성" },
    { emoji:"🖼️", text:"SNS 이미지 생성", cat:"이미지" },
    { emoji:"💻", text:"코드 빠르게 짜기", cat:"코딩" },
    { emoji:"🎬", text:"숏폼 영상 제작", cat:"영상" },
    { emoji:"📝", text:"블로그 초안 작성", cat:"챗봇" },
    { emoji:"🌐", text:"문서 번역하기", cat:"번역" },
    { emoji:"🎵", text:"배경음악 만들기", cat:"음성" },
    { emoji:"🔍", text:"최신 정보 검색", cat:"챗봇" },
    { emoji:"🤖", text:"아바타 영상 제작", cat:"영상" },
  ];
  const CATS = ["전체", "챗봇", "이미지", "영상", "코딩", "생산성", "음성", "번역"];

  let currentCat = "전체";
  let currentSearch = "";

  function freeClass(free) {
    if (free === "무료") return "free-free";
    if (free === "유료") return "free-paid";
    return "free-partial";
  }

  function renderCategories() {
    document.getElementById("categoryFilter").innerHTML = CATS.map(cat => {
      const count = cat === "전체" ? TOOLS.length : TOOLS.filter(t => t.cat === cat).length;
      const active = cat === currentCat ? " active" : "";
      return `<button class="cat-btn${active}" onclick="selectCat('${cat}')">${cat} <span style="opacity:0.4;">${count}</span></button>`;
    }).join("");
  }

  function renderTools() {
    const q = currentSearch.toLowerCase();
    const filtered = TOOLS.filter(t => {
      const matchCat = currentCat === "전체" || t.cat === currentCat;
      const matchQ   = !q || t.name.toLowerCase().includes(q) || t.desc.toLowerCase().includes(q) || t.cat.includes(q);
      return matchCat && matchQ;
    });

    const grid = document.getElementById("toolsGrid");
    const noRes = document.getElementById("noResults");

    if (filtered.length === 0) { grid.innerHTML = ""; noRes.classList.add("show"); return; }
    noRes.classList.remove("show");

    grid.innerHTML = filtered.map((t, i) => `
      <a href="tool.html?id=${t.id}" class="tool-card fade-in" style="animation-delay:${Math.min(i*35,280)}ms; opacity:0;">
        <div class="card-top">
          <div class="card-info">
            <span class="card-emoji">${t.emoji}</span>
            <div>
              <div class="card-name-row">
                <span class="card-name">${t.name}</span>
                ${t.hot ? '<span class="hot-badge">HOT</span>' : ''}
              </div>
              <div class="card-cat">${t.cat}</div>
            </div>
          </div>
          <span class="free-tag ${freeClass(t.free)}">${t.free}</span>
        </div>
        <p class="card-desc">${t.desc}</p>
        <div class="card-foot">
          <span class="card-more">자세히 보기</span>
          <span class="card-arrow">→</span>
        </div>
      </a>
    `).join("");
  }

  function renderSituations() {
    document.getElementById("situationGrid").innerHTML = SITUATIONS.map(s => `
      <button class="sit-card" onclick="selectCat('${s.cat}')">
        <span class="sit-emoji">${s.emoji}</span>
        <p class="sit-text">${s.text}</p>
        <p class="sit-cat">${s.cat}</p>
      </button>
    `).join("");
  }

  function selectCat(cat) {
    currentCat = cat;
    currentSearch = "";
    document.getElementById("searchInput").value = "";
    renderCategories();
    renderTools();
    const filterEl = document.getElementById("categoryFilter");
    const top = filterEl.getBoundingClientRect().top + window.scrollY - 56;
    window.scrollTo({ top, behavior: "smooth" });
  }

  function filterTools() {
    currentSearch = document.getElementById("searchInput").value;
    currentCat = "전체";
    renderCategories();
    renderTools();
  }

  document.addEventListener("DOMContentLoaded", () => {
    const urlCat = new URLSearchParams(window.location.search).get("cat");
    if (urlCat && CATS.includes(urlCat)) currentCat = urlCat;
    const el = document.getElementById("totalCountHero");
    if (el) el.textContent = TOOLS.length;
    renderCategories();
    renderTools();
    renderSituations();
  });
  </script>
</body>
</html>

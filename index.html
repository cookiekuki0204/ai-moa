<!DOCTYPE html>
<html lang="ko" class="light scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="한국어 AI 툴 디렉토리. 챗봇·이미지·영상·코딩·생산성·음성·번역 분야 AI 툴을 한눈에 비교하고 찾아보세요.">
  <title>AI모아 — 한국어 AI 툴 디렉토리</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="data.js"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] } } }
    }
  </script>
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; }
    .tool-card { transition: transform 0.2s, box-shadow 0.2s; }
    .tool-card:hover { transform: translateY(-3px); }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeInUp 0.35s ease forwards; }
    .cat-btn-active-all        { background:#64748b; color:#fff; border-color:#64748b; }
    .cat-btn-active-챗봇       { background:#6366f1; color:#fff; border-color:#6366f1; }
    .cat-btn-active-이미지     { background:#f43f5e; color:#fff; border-color:#f43f5e; }
    .cat-btn-active-영상       { background:#8b5cf6; color:#fff; border-color:#8b5cf6; }
    .cat-btn-active-코딩       { background:#10b981; color:#fff; border-color:#10b981; }
    .cat-btn-active-생산성     { background:#f59e0b; color:#fff; border-color:#f59e0b; }
    .cat-btn-active-음성       { background:#0ea5e9; color:#fff; border-color:#0ea5e9; }
    .cat-btn-active-번역       { background:#14b8a6; color:#fff; border-color:#14b8a6; }
  </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-white min-h-screen">

  <!-- ── Navbar ── -->
  <nav class="sticky top-0 z-50 bg-white/85 dark:bg-slate-900/85 backdrop-blur-xl border-b border-slate-200 dark:border-slate-800">
    <div class="max-w-7xl mx-auto px-5 h-14 flex items-center justify-between">
      <a href="index.html" class="flex items-center gap-2 font-black text-xl text-slate-900 dark:text-white no-underline">
        <span class="text-2xl">🤖</span>
        <span>AI<span class="text-indigo-500">모아</span></span>
      </a>
      <div class="flex items-center gap-3">
        <span class="text-[11px] font-black text-slate-400 dark:text-slate-500 hidden sm:block uppercase tracking-widest">AI 툴 디렉토리</span>
        <button id="darkToggle" onclick="toggleDark()" class="w-9 h-9 rounded-full bg-slate-100 dark:bg-slate-800 flex items-center justify-center transition-colors hover:bg-slate-200 dark:hover:bg-slate-700">
          <span id="darkIcon">🌙</span>
        </button>
      </div>
    </div>
  </nav>

  <!-- ── Hero ── -->
  <section class="relative overflow-hidden bg-gradient-to-br from-slate-900 via-indigo-950 to-violet-950 py-20 px-5">
    <div class="absolute inset-0 pointer-events-none overflow-hidden">
      <div class="absolute -top-32 -right-32 w-80 h-80 bg-indigo-500/15 rounded-full blur-3xl"></div>
      <div class="absolute -bottom-32 -left-32 w-80 h-80 bg-violet-500/15 rounded-full blur-3xl"></div>
    </div>
    <div class="relative max-w-3xl mx-auto text-center">
      <div class="inline-flex items-center gap-2 bg-white/10 backdrop-blur px-4 py-1.5 rounded-full text-[11px] font-black text-indigo-300 uppercase tracking-widest mb-6">
        <span class="w-1.5 h-1.5 bg-indigo-400 rounded-full animate-pulse"></span>
        2026 · 매주 업데이트
      </div>
      <h1 class="text-4xl md:text-6xl font-black text-white leading-tight mb-4">
        지금 필요한 AI 툴,<br>
        <span class="text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-violet-400">한번에 찾기</span>
      </h1>
      <p class="text-slate-400 text-base md:text-lg font-bold mb-8">챗봇 · 이미지 · 영상 · 코딩 · 생산성 · 음성 · 번역</p>
      <div class="relative max-w-xl mx-auto">
        <div class="absolute inset-y-0 left-4 flex items-center pointer-events-none">
          <i class="fa-solid fa-magnifying-glass text-slate-400"></i>
        </div>
        <input
          type="text"
          id="searchInput"
          placeholder="툴 이름 또는 기능 검색... (예: 이미지, 자막, 코딩)"
          class="w-full pl-11 pr-4 py-4 rounded-2xl bg-white/10 backdrop-blur border border-white/20 text-white placeholder-slate-500 font-bold text-sm focus:outline-none focus:border-indigo-400 focus:bg-white/15 transition-all"
          oninput="filterTools()"
        >
      </div>
      <div class="flex justify-center gap-8 mt-8">
        <div class="text-center">
          <div class="text-2xl font-black text-white" id="totalCount">—</div>
          <div class="text-[11px] font-bold text-slate-500">등록된 툴</div>
        </div>
        <div class="w-px bg-white/10"></div>
        <div class="text-center">
          <div class="text-2xl font-black text-white">7</div>
          <div class="text-[11px] font-bold text-slate-500">카테고리</div>
        </div>
        <div class="w-px bg-white/10"></div>
        <div class="text-center">
          <div class="text-2xl font-black text-emerald-400">무료포함</div>
          <div class="text-[11px] font-bold text-slate-500">이용 가능</div>
        </div>
      </div>
    </div>
  </section>

  <!-- ── Category Filter ── -->
  <div class="sticky top-14 z-40 bg-white/90 dark:bg-slate-900/90 backdrop-blur-xl border-b border-slate-200 dark:border-slate-800">
    <div class="max-w-7xl mx-auto px-5 py-3 overflow-x-auto hide-scrollbar">
      <div id="categoryFilter" class="flex gap-2 flex-nowrap"></div>
    </div>
  </div>

  <!-- ── Main ── -->
  <main class="max-w-7xl mx-auto px-5 py-10">
    <div id="noResults" class="hidden text-center py-20">
      <div class="text-5xl mb-4">🤔</div>
      <p class="font-black text-xl text-slate-500 dark:text-slate-400">검색 결과가 없어요</p>
      <p class="text-slate-400 text-sm mt-2 font-bold">다른 키워드로 검색해보세요</p>
    </div>
    <div id="toolsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4"></div>

    <!-- Situation Section -->
    <section class="mt-16">
      <div class="mb-6">
        <p class="text-[11px] font-black text-indigo-500 uppercase tracking-widest mb-2">Quick Finder</p>
        <h2 class="text-2xl md:text-3xl font-black text-slate-800 dark:text-white">이런 상황이라면?</h2>
        <p class="text-sm text-slate-500 dark:text-slate-400 mt-1 font-bold">클릭하면 해당 카테고리 툴을 바로 확인해요</p>
      </div>
      <div id="situationGrid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-3"></div>
    </section>
  </main>

  <!-- ── Footer ── -->
  <footer class="border-t border-slate-200 dark:border-slate-800 mt-16 py-10 px-5">
    <div class="max-w-7xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
      <div class="flex items-center gap-2 font-black text-lg">
        <span>🤖</span><span class="text-slate-900 dark:text-white">AI<span class="text-indigo-500">모아</span></span>
      </div>
      <p class="text-xs text-slate-400 font-bold">© 2026 AI모아 · 한국어 AI 툴 디렉토리</p>
      <div class="flex gap-4 text-xs font-black text-slate-400">
        <a href="#" class="hover:text-indigo-500 transition-colors">툴 제보하기</a>
        <span>·</span>
        <a href="#" class="hover:text-indigo-500 transition-colors">광고 문의</a>
      </div>
    </div>
  </footer>

  <script>
  const SITUATIONS = [
    { emoji:"🎙️", text:"회의 자동 요약",    cat:"음성" },
    { emoji:"📊", text:"PPT 만들기",         cat:"생산성" },
    { emoji:"🖼️", text:"SNS 이미지 생성",    cat:"이미지" },
    { emoji:"💻", text:"코드 빠르게 짜기",   cat:"코딩" },
    { emoji:"🎬", text:"숏폼 영상 제작",     cat:"영상" },
    { emoji:"📝", text:"블로그 초안 작성",   cat:"챗봇" },
    { emoji:"🌐", text:"문서 번역하기",      cat:"번역" },
    { emoji:"🎵", text:"배경음악 만들기",    cat:"음성" },
    { emoji:"🔍", text:"최신 정보 검색",     cat:"챗봇" },
    { emoji:"🤖", text:"아바타 영상 제작",   cat:"영상" },
  ];
  const CATS = ["전체", "챗봇", "이미지", "영상", "코딩", "생산성", "음성", "번역"];

  let currentCat = "전체";
  let currentSearch = "";

  function renderCategories() {
    const el = document.getElementById("categoryFilter");
    el.innerHTML = CATS.map(cat => {
      const count = cat === "전체" ? TOOLS.length : TOOLS.filter(t => t.cat === cat).length;
      const isActive = cat === currentCat;
      const safeKey = cat === "전체" ? "all" : cat;
      const activeClass = isActive
        ? `cat-btn-active-${safeKey} shadow-sm`
        : "bg-white dark:bg-slate-800 text-slate-600 dark:text-slate-400 border-slate-200 dark:border-slate-700 hover:border-slate-300 dark:hover:border-slate-600";
      return `<button onclick="selectCat('${cat}')" class="flex-none px-4 py-1.5 rounded-full border text-xs font-black transition-all whitespace-nowrap ${activeClass}">
        ${cat} <span class="opacity-50 ml-0.5">${count}</span>
      </button>`;
    }).join("");
  }

  function renderTools() {
    const q = currentSearch.toLowerCase();
    const filtered = TOOLS.filter(t => {
      const matchCat = currentCat === "전체" || t.cat === currentCat;
      const matchQ   = !q || t.name.toLowerCase().includes(q) || t.desc.toLowerCase().includes(q) || t.cat.includes(q);
      return matchCat && matchQ;
    });

    const grid = document.getElementById("toolsGrid");
    const noRes = document.getElementById("noResults");

    if (filtered.length === 0) {
      grid.innerHTML = "";
      noRes.classList.remove("hidden");
      return;
    }
    noRes.classList.add("hidden");

    grid.innerHTML = filtered.map((t, i) => `
      <a href="tool.html?id=${t.id}" class="tool-card bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 p-5 flex flex-col gap-3 hover:shadow-xl dark:hover:shadow-black/30 hover:border-indigo-200 dark:hover:border-indigo-800 no-underline fade-in" style="animation-delay:${Math.min(i * 40, 300)}ms; opacity:0;">
        <div class="flex items-start justify-between gap-2">
          <div class="flex items-center gap-3">
            <div class="w-11 h-11 rounded-xl ${CAT_ICON_BG[t.cat] || ''} flex items-center justify-center text-2xl flex-shrink-0">${t.emoji}</div>
            <div>
              <div class="flex items-center gap-1.5 flex-wrap">
                <h3 class="font-black text-slate-900 dark:text-white text-sm leading-tight">${t.name}</h3>
                ${t.hot ? '<span class="text-[9px] font-black bg-rose-500 text-white px-1.5 py-0.5 rounded-full leading-none">HOT</span>' : ''}
              </div>
              <span class="text-[10px] font-black ${CAT_TEXT[t.cat] || ''} uppercase tracking-wider">${t.cat}</span>
            </div>
          </div>
          <span class="text-[10px] font-black px-2 py-1 rounded-lg flex-shrink-0 leading-none ${FREE_CLASS[t.free] || ''}">${t.free}</span>
        </div>
        <p class="text-xs text-slate-500 dark:text-slate-400 font-bold leading-relaxed flex-1">${t.desc}</p>
        <div class="flex items-center justify-between pt-1 border-t border-slate-100 dark:border-slate-800">
          <span class="text-[10px] font-black text-slate-400">자세히 보기 →</span>
          <i class="fa-solid fa-arrow-right text-[10px] text-slate-300 dark:text-slate-600"></i>
        </div>
      </a>
    `).join("");
  }

  function renderSituations() {
    document.getElementById("situationGrid").innerHTML = SITUATIONS.map(s => `
      <button onclick="selectCat('${s.cat}')"
        class="text-left p-4 rounded-2xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 hover:border-indigo-300 dark:hover:border-indigo-700 hover:shadow-md transition-all">
        <span class="text-2xl block mb-2">${s.emoji}</span>
        <p class="font-black text-slate-800 dark:text-white text-sm leading-tight mb-1">${s.text}</p>
        <p class="text-[10px] font-black ${CAT_TEXT[s.cat] || ''} uppercase tracking-wider">${s.cat}</p>
      </button>
    `).join("");
  }

  function selectCat(cat) {
    currentCat = cat;
    currentSearch = "";
    document.getElementById("searchInput").value = "";
    renderCategories();
    renderTools();
    const top = document.getElementById("categoryFilter").getBoundingClientRect().top + window.scrollY - 56;
    window.scrollTo({ top, behavior: "smooth" });
  }

  function filterTools() {
    currentSearch = document.getElementById("searchInput").value;
    currentCat = "전체";
    renderCategories();
    renderTools();
  }

  function toggleDark() {
    const isDark = document.documentElement.classList.toggle("dark");
    document.getElementById("darkIcon").textContent = isDark ? "☀️" : "🌙";
    localStorage.setItem("aim-theme", isDark ? "dark" : "light");
  }

  document.addEventListener("DOMContentLoaded", () => {
    if (localStorage.getItem("aim-theme") === "dark") {
      document.documentElement.classList.add("dark");
      document.getElementById("darkIcon").textContent = "☀️";
    }
    // URL에서 카테고리 파라미터 읽기
    const urlCat = new URLSearchParams(window.location.search).get("cat");
    if (urlCat && CATS.includes(urlCat)) currentCat = urlCat;

    document.getElementById("totalCount").textContent = TOOLS.length;
    renderCategories();
    renderTools();
    renderSituations();
  });
  </script>
</body>
</html>
